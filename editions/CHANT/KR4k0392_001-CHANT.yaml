body:
  text: 會稽典錄夏方字文公家遭疫癘父母伯叔一時死凡十三喪方年十四晝則負土哀號暮則扶棺哭泣比葬年十七烏鳥聚集猛獸乳其側夏香字曼卿永興人也年十五縣長葛君會客飲宴時郡遭大旱香進諫曰昔殷湯遭旱以六事自責而雨澤應澍成王悔過偃禾復起自古先聖畏懼天異必思變復以濟民命今始罹天災縣界獨甚未聞明達崇殷周之德飲宴獨歡百姓枯瘁神祇有靈必不享也百姓不足君孰與足宜當還守即罷會身損俸祿以贍民飢
